---
# ─── Redis Deployment ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379

---
# ─── Redis Service ───────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: dev
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ─── Python App Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pythonapp
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pythonapp
  template:
    metadata:
      labels:
        app: pythonapp
    spec:
      containers:
        - name: pythonapp
          image: vishwacloudlab/pythonapp:v4-var
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"

---
# ─── Python App Service (NodePort for browser access) ────────────
apiVersion: v1
kind: Service
metadata:
  name: pythonapp
  namespace: dev
spec:
  type: NodePort
  selector:
    app: pythonapp
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30010
