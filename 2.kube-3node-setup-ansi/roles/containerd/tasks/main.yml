# -------------------------
# Ubuntu: install containerd.io from Docker repo
# -------------------------
- name: Add Docker repo (Ubuntu)
  shell: |
    set -e
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
    > /etc/apt/sources.list.d/docker.list
  args:
    executable: /bin/bash
  when: ansible_os_family == "Debian"

- name: Install containerd (Ubuntu)
  apt:
    update_cache: yes
    name: containerd.io
    state: present
  when: ansible_os_family == "Debian"

- name: Ensure /etc/containerd exists (Ubuntu)
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"

- name: Deploy containerd config.toml (Ubuntu)
  copy:
    src: containerd-config.toml
    dest: /etc/containerd/config.toml
    mode: "0644"
  notify: restart containerd
  when: ansible_os_family == "Debian"

- name: Enable and start containerd (Ubuntu)
  systemd:
    name: containerd
    enabled: true
    state: started
  when: ansible_os_family == "Debian"


# -------------------------
# Rocky/RHEL: install containerd from Docker repo
# -------------------------
- name: Remove conflicting packages (Rocky/RHEL)
  dnf:
    name:
      - podman
      - runc
    state: absent
  when: ansible_os_family == "RedHat"
  ignore_errors: yes

- name: Add Docker GPG key (Rocky/RHEL)
  rpm_key:
    key: https://download.docker.com/linux/centos/gpg
    state: present
  when: ansible_os_family == "RedHat"

- name: Add Docker repository (Rocky/RHEL)
  dnf:
    name: dnf-plugins-core
    state: present
  when: ansible_os_family == "RedHat"

- name: Enable Docker repository (Rocky/RHEL)
  shell: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  when: ansible_os_family == "RedHat"

- name: Install containerd (Rocky/RHEL)
  dnf:
    name: containerd.io
    state: present
  when: ansible_os_family == "RedHat"

- name: Ensure /etc/containerd exists (Rocky/RHEL)
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"
  when: ansible_os_family == "RedHat"

- name: Deploy containerd config.toml (Rocky/RHEL)
  copy:
    src: containerd-config.toml
    dest: /etc/containerd/config.toml
    mode: "0644"
  notify: restart containerd
  when: ansible_os_family == "RedHat"

- name: Enable and start containerd (Rocky/RHEL)
  systemd:
    name: containerd
    enabled: true
    state: started
  when: ansible_os_family == "RedHat"

- name: Configure kubelet to use containerd socket (Rocky/RHEL)
  copy:
    dest: /etc/sysconfig/kubelet
    content: |
      KUBELET_EXTRA_ARGS=--container-runtime-endpoint=unix:///run/containerd/containerd.sock
    mode: "0644"
  when: ansible_os_family == "RedHat"
  notify: restart kubelet

